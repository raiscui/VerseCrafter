[workspace]
name = "versecrafter"
version = "0.1.0"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Python 与基础构建工具由 pixi 统一管理.
python = "3.11.*"
pip = "*"
git = "*"
cmake = "*"
ninja = "*"
setuptools = "*"
wheel = "*"
pytest = "*"

[pypi-dependencies]
# PyTorch 官方 cu128 wheel.
# 这里不用 conda 的 `pytorch-cuda`, 因为当前 channels 下没有 `12.8.*` 候选包.
# 直接固定到已在 Blackwell 现场验证通过的 wheel 组合, 避免 `pixi install` 回滚现场成功状态.
torch = { version = "==2.7.0", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "==0.22.0", index = "https://download.pytorch.org/whl/cu128" }
torchaudio = { version = "==2.7.0", index = "https://download.pytorch.org/whl/cu128" }

# 根仓库推理依赖.
pillow = "*"
einops = "*"
safetensors = "*"
timm = "*"
tomesd = "*"
torchdiffeq = "*"
torchsde = "*"
decord = "*"
datasets = "*"
numpy = "*"
scikit-image = "*"
opencv-python = "*"
omegaconf = "*"
sentencepiece = "*"
albumentations = "*"
imageio = { version = "*", extras = ["ffmpeg", "pyav"] }
tensorboard = "*"
beautifulsoup4 = "*"
ftfy = "*"
func-timeout = "*"
onnxruntime = "*"
flask = "*"
flask-cors = "*"
accelerate = ">=1.10.1"
gradio = ">=3.41.2"
diffusers = ">=0.30.1"
transformers = "==4.57.0"
kornia = "==0.8.0"
matplotlib = "*"
huggingface-hub = "*"
modelscope = "*"

# Grounded-SAM-2 / GroundingDINO 运行时依赖.
supervision = ">=0.22.0"
pycocotools = "*"
hydra-core = ">=1.3.2"
iopath = ">=0.1.10"
addict = "*"
yapf = "*"

[tasks]
# MoGe 通过 git 安装, 保持与原 README 的获取方式一致.
install-moge = "python -m pip install git+https://github.com/microsoft/MoGe.git"

# Grounded-SAM-2 与 GroundingDINO 都直接复用当前 Pixi 环境里的 torch / setuptools,
# 避免 editable 安装时再拉一整套隔离构建依赖, 白白浪费代理流量.
install-grounded-sam2 = "bash ./scripts/install_grounded_sam2.sh"
install-grounding-dino = "python -m pip install --no-build-isolation -e ./third_party/Grounded-SAM-2/grounding_dino"

# flash-attn 默认只保留源码安装路径, 这里主动限流编译并发.
# 默认至少预留 4 个 CPU, 避免 bootstrap 把整机打满.
install-flash-attn = "bash ./scripts/install_flash_attn.sh"

# pytorch3d 仍按上游推荐从源码安装.
# 为避免复杂 shell 逻辑再次被 Pixi 内联解析器误伤, 这里也外提到独立脚本.
install-pytorch3d = "bash ./scripts/install_pytorch3d.sh"

# 一次性补齐需要特殊安装参数的扩展依赖.
bootstrap = { depends-on = ["install-moge", "install-grounded-sam2", "install-grounding-dino", "install-flash-attn", "install-pytorch3d"] }
