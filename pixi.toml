[workspace]
name = "versecrafter"
version = "0.1.0"
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
# Python 与基础构建工具由 pixi 统一管理.
python = "3.11.*"
pip = "*"
git = "*"
cmake = "*"
ninja = "*"
setuptools = "*"
wheel = "*"
pytest = "*"

# 与 Grounded-SAM-2 / SAM2 约束对齐, 避免安装时再被 pip 回滚或升级.
pytorch = "2.3.1.*"
torchvision = "0.18.1.*"
torchaudio = "2.3.1.*"
pytorch-cuda = "12.1.*"

[pypi-dependencies]
# 根仓库推理依赖.
pillow = "*"
einops = "*"
safetensors = "*"
timm = "*"
tomesd = "*"
torchdiffeq = "*"
torchsde = "*"
decord = "*"
datasets = "*"
numpy = "*"
scikit-image = "*"
opencv-python = "*"
omegaconf = "*"
sentencepiece = "*"
albumentations = "*"
imageio = { version = "*", extras = ["ffmpeg", "pyav"] }
tensorboard = "*"
beautifulsoup4 = "*"
ftfy = "*"
func-timeout = "*"
onnxruntime = "*"
flask = "*"
flask-cors = "*"
accelerate = ">=1.10.1"
gradio = ">=3.41.2"
diffusers = ">=0.30.1"
transformers = "==4.57.0"
kornia = "==0.8.0"
matplotlib = "*"
huggingface-hub = "*"
modelscope = "*"

# Grounded-SAM-2 / GroundingDINO 运行时依赖.
supervision = ">=0.22.0"
pycocotools = "*"
hydra-core = ">=1.3.2"
iopath = ">=0.1.10"
addict = "*"
yapf = "*"

[tasks]
# MoGe 通过 git 安装, 保持与原 README 的获取方式一致.
install-moge = "python -m pip install git+https://github.com/microsoft/MoGe.git"

# Grounded-SAM-2 与 GroundingDINO 仍保留原始 editable / no-build-isolation 语义.
install-grounded-sam2 = "python -m pip install -e ./third_party/Grounded-SAM-2"
install-grounding-dino = "python -m pip install --no-build-isolation -e ./third_party/Grounded-SAM-2/grounding_dino"

# flash-attn 默认只保留源码安装路径, 这里主动限流编译并发.
# 默认至少预留 4 个 CPU, 避免 bootstrap 把整机打满.
install-flash-attn = { cmd = ["bash", "-lc", """
set -euo pipefail

# 如果用户已经显式指定 MAX_JOBS, 则尊重手动覆盖.
if [ -n "${MAX_JOBS:-}" ]; then
  jobs="${MAX_JOBS}"
  echo "[install-flash-attn] 使用外部指定的 MAX_JOBS=${jobs}"
else
  cpu_total="$(nproc)"
  reserve="${FLASH_ATTN_RESERVED_CPUS:-4}"

  if ! [[ "${reserve}" =~ ^[0-9]+$ ]]; then
    echo "[install-flash-attn] FLASH_ATTN_RESERVED_CPUS 必须是非负整数, 当前值: ${reserve}" >&2
    exit 1
  fi

  jobs=$(( cpu_total > reserve ? cpu_total - reserve : 1 ))
  echo "[install-flash-attn] cpu_total=${cpu_total}, reserved=${reserve}, MAX_JOBS=${jobs}"
fi

MAX_JOBS="${jobs}" python -m pip install --no-build-isolation flash-attn
"""] }

# pytorch3d 仍按上游推荐从源码安装.
# 这里避免使用 Pixi 默认 shell 不支持的 Bash `if`, 改成 and/or list.
install-pytorch3d = """
git clone https://github.com/facebookresearch/pytorch3d.git pytorch3d || test -d pytorch3d
&& python -m pip install --no-build-isolation ./pytorch3d
"""

# 一次性补齐需要特殊安装参数的扩展依赖.
bootstrap = { depends-on = ["install-moge", "install-grounded-sam2", "install-grounding-dino", "install-flash-attn", "install-pytorch3d"] }
